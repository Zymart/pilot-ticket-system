services:
  # Main bot service
  - type: web
    name: ticket-bot
    runtime: node
    region: oregon  # Change to your region: ohio, virginia, frankfurt, singapore, etc.
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DISCORD_TOKEN
        sync: false  # Set in dashboard manually
      - key: CLIENT_ID
        sync: false
      - key: GUILD_ID
        sync: false

  # Cron job to keep bot alive (pings every 10 minutes)
  - type: cron
    name: ticket-bot-ping
    runtime: node
    region: oregon  # Match your web service region
    schedule: "*/10 * * * *"  # Every 10 minutes
    buildCommand: echo "No build needed"
    startCommand: curl -s https://$RENDER_EXTERNAL_HOSTNAME/health || echo "Ping failed"
