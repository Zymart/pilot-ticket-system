# render.yaml (add to repo root)
services:
  - type: web
    name: ticket-bot
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: GUILD_ID
        sync: false
      - key: NODE_ENV
        value: production

  - type: cron
    name: ticket-bot-ping
    runtime: node
    schedule: "*/10 * * * *"  # Every 10 minutes
    buildCommand: npm install
    startCommand: curl $RENDER_EXTERNAL_URL/health
