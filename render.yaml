services:
  - type: web
    name: ticket-bot
    runtime: node
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: GUILD_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JSONBIN_MASTER_KEY
        sync: false

  - type: cron
    name: ticket-bot-ping
    runtime: node
    region: oregon
    schedule: "*/10 * * * *"
    buildCommand: echo "No build needed"
    startCommand: curl -s https://$RENDER_EXTERNAL_HOSTNAME/health || echo "Ping failed"
